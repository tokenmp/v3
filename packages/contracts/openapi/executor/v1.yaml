openapi: 3.0.3
info:
  title: TokenMP v3 Executor API
  version: 0.1.0
  description: |
    TokenMP v3 Executor API is the confirmed design contract and the single
    source of truth for consumers of the Executor Service HTTP interface.
    Only the `/healthz` Foundation endpoint is currently implemented. Every
    other endpoint in this document specifies confirmed intended behavior but
    is not yet implemented; this contract does not claim SDK integration or
    upstream forwarding is available today.

    The planned interface is compatible with OpenAI and Anthropic protocols.

    **Model Selector Syntax**: The `model` field supports extended selector syntax:
    - `gpt-4o` — base model, uses default route group
    - `gpt-4o:fast` — model with route group
    - `gpt-4o@openai` — model with provider constraint
    - `gpt-4o:fast@openai` — model with route group and provider
    - `auto` — automatic model selection

    **Thinking/Reasoning**: Models with `thinking` capability support reasoning
    parameters. The executor normalizes thinking parameters across protocols:
    - OpenAI: `reasoning_effort` / `reasoning.effort`
    - Anthropic: `thinking.type` / `thinking.budget_tokens`
    - Unified: effort levels (low/medium/high/xhigh/max) mapped to budget tokens

    For Anthropic Messages, when `thinking.type` is `enabled`, `budget_tokens`
    is required and must satisfy `1024 <= budget_tokens < max_tokens`; when
    `thinking.type` is `disabled`, `budget_tokens` must be omitted. The
    executor defensively enforces these observable bounds regardless of
    upstream behavior.

    **Error Formats**: Error responses follow each protocol's native format:
    - OpenAI (chat/responses/models/images): `{"error": {...}, "status": N}`
    - Anthropic (messages): `{"type": "error", "error": {...}, "request_id": "..."}`
servers:
  - url: http://127.0.0.1:8081
    description: Local development
security:
  - BearerAuth: []
paths:
  /healthz:
    get:
      summary: Liveness probe
      description: Reports whether the process and HTTP server are alive. Does not depend on external resources.
      operationId: executorGetHealthz
      security: []
      responses:
        '200':
          description: Service is alive.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '405':
          description: Method not allowed.
    head:
      summary: Liveness probe (HEAD)
      description: Same status and headers as GET /healthz but with an empty body.
      operationId: executorHeadHealthz
      security: []
      responses:
        '200':
          description: Service is alive.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
        '405':
          description: Method not allowed.

  /v1/models:
    get:
      summary: List available models
      description: |
        Returns the list of models available to the authenticated user.
        Response follows OpenAI /v1/models format with TokenMP extensions
        for capabilities, context window, max output tokens, and thinking support.
      operationId: listModels
      responses:
        '200':
          description: Model list retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
        '401':
          $ref: '#/components/responses/OpenAIUnauthorized'
        '501':
          $ref: '#/components/responses/OpenAINotImplemented'
        '500':
          $ref: '#/components/responses/OpenAIServerError'

  /v1/chat/completions:
    post:
      summary: Create chat completion
      description: |
        Creates a chat completion response, or a streamed sequence of chat completion
        chunk objects. Compatible with OpenAI /v1/chat/completions protocol.

        Supports thinking/reasoning via `reasoning_effort` parameter for models
        with `thinking` capability. The `model` field accepts extended selector syntax.
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
      responses:
        '200':
          description: Chat completion created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each event is `data: {JSON}\n\n`.
                  Stream terminates with `data: [DONE]\n\n`.
        '400':
          $ref: '#/components/responses/OpenAIBadRequest'
        '401':
          $ref: '#/components/responses/OpenAIUnauthorized'
        '403':
          $ref: '#/components/responses/OpenAIPermissionDenied'
        '404':
          $ref: '#/components/responses/OpenAINotFound'
        '429':
          $ref: '#/components/responses/OpenAIRateLimit'
        '501':
          $ref: '#/components/responses/OpenAINotImplemented'
        '502':
          $ref: '#/components/responses/OpenAIUpstreamError'
        '500':
          $ref: '#/components/responses/OpenAIServerError'

  /v1/messages:
    post:
      summary: Create message (Anthropic)
      description: |
        Creates a message response compatible with Anthropic /v1/messages protocol.
        Supports extended thinking via `thinking` parameter for models with
        `thinking` capability. The `model` field accepts extended selector syntax.

        Authentication uses `Authorization: Bearer <key>` instead of Anthropic's
        native `x-api-key` header.
      operationId: createMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '200':
          description: Message created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMessageResponse'
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream for Anthropic protocol.
                  Events: `message_start`, `content_block_start`, `content_block_delta`,
                  `content_block_stop`, `message_delta`, `message_stop`, `ping`.
        '400':
          $ref: '#/components/responses/AnthropicBadRequest'
        '401':
          $ref: '#/components/responses/AnthropicUnauthorized'
        '403':
          $ref: '#/components/responses/AnthropicPermissionDenied'
        '404':
          $ref: '#/components/responses/AnthropicNotFound'
        '429':
          $ref: '#/components/responses/AnthropicRateLimit'
        '529':
          $ref: '#/components/responses/AnthropicOverloaded'
        '501':
          $ref: '#/components/responses/AnthropicNotImplemented'
        '500':
          $ref: '#/components/responses/AnthropicServerError'

  /v1/responses:
    post:
      summary: Create response (OpenAI Responses API)
      description: |
        Creates a response using OpenAI's Responses API protocol.
        Supports thinking/reasoning via `reasoning` parameter for models
        with `thinking` capability. The `model` field accepts extended selector syntax.
      operationId: createResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateResponseRequest'
      responses:
        '200':
          description: Response created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseResponse'
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Events include `response.created`,
                  `response.output_item.added`, `response.content_part.added`,
                  `response.output_text.delta`, `response.output_text.done`,
                  `response.content_part.done`, `response.output_item.done`,
                  `response.completed`, `response.incomplete`, `response.failed`.
        '400':
          $ref: '#/components/responses/OpenAIBadRequest'
        '401':
          $ref: '#/components/responses/OpenAIUnauthorized'
        '403':
          $ref: '#/components/responses/OpenAIPermissionDenied'
        '404':
          $ref: '#/components/responses/OpenAINotFound'
        '429':
          $ref: '#/components/responses/OpenAIRateLimit'
        '501':
          $ref: '#/components/responses/OpenAINotImplemented'
        '502':
          $ref: '#/components/responses/OpenAIUpstreamError'
        '500':
          $ref: '#/components/responses/OpenAIServerError'

  /v1/images/generations:
    post:
      summary: Create image generation
      description: |
        Creates an image generation request compatible with OpenAI /v1/images/generations.
        The `model` field accepts extended selector syntax for image models.
      operationId: createImage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageRequest'
      responses:
        '200':
          description: Image generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateImageResponse'
        '400':
          $ref: '#/components/responses/OpenAIBadRequest'
        '401':
          $ref: '#/components/responses/OpenAIUnauthorized'
        '404':
          $ref: '#/components/responses/OpenAINotFound'
        '429':
          $ref: '#/components/responses/OpenAIRateLimit'
        '501':
          $ref: '#/components/responses/OpenAINotImplemented'
        '502':
          $ref: '#/components/responses/OpenAIUpstreamError'
        '500':
          $ref: '#/components/responses/OpenAIServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        TokenMP API key passed as Bearer token. Compatible with OpenAI SDK format.
        Example: `Authorization: Bearer tm-xxxxxxxxxxxx`

  headers:
    CacheControlNoStore:
      schema:
        type: string
        example: no-store

  # ─── OpenAI Error Responses ─────────────────────────────────────────
  responses:
    OpenAIBadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OpenAIErrorResponse'
          example:
            error:
              message: "model is required"
              type: invalid_request_error
              code: INVALID_PARAM
              param: model
            status: 400
    OpenAIUnauthorized:
      description: Invalid or missing API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OpenAIErrorResponse'
          example:
            error:
              message: "Invalid API key provided."
              type: authentication_error
              code: INVALID_API_KEY
              param: null
            status: 401
    OpenAIPermissionDenied:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OpenAIErrorResponse'
          example:
            error:
              message: "You do not have permission to access this resource."
              type: permission_error
              code: FORBIDDEN
              param: null
            status: 403
    OpenAINotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OpenAIErrorResponse'
          example:
            error:
              message: "The model 'gpt-999' does not exist."
              type: invalid_request_error
              code: MODEL_NOT_FOUND
              param: model
            status: 404
    OpenAIRateLimit:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OpenAIErrorResponse'
          example:
            error:
              message: "Rate limit exceeded. Please retry after 30 seconds."
              type: rate_limit_error
              code: RATE_LIMITED
              param: null
            status: 429
      headers:
        Retry-After:
          schema:
            type: integer
            description: Seconds to wait before retrying.
    OpenAINotImplemented:
      description: Endpoint is defined by the design contract but is not implemented.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OpenAIErrorResponse'
          example:
            error:
              message: "This endpoint is not implemented."
              type: api_error
              code: NOT_IMPLEMENTED
              param: null
            status: 501
    OpenAIUpstreamError:
      description: Upstream provider error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OpenAIErrorResponse'
          example:
            error:
              message: "上游服务暂时不可用，请稍后重试。"
              type: api_error
              code: UPSTREAM_ERROR
              param: null
            status: 502
    OpenAIServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OpenAIErrorResponse'
          example:
            error:
              message: "An internal error occurred."
              type: api_error
              code: INTERNAL_ERROR
              param: null
            status: 500

    # ─── Anthropic Error Responses ─────────────────────────────────────
    AnthropicBadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthropicErrorResponse'
          example:
            type: error
            error:
              type: invalid_request_error
              message: "model is required"
            request_id: req_abc123
    AnthropicUnauthorized:
      description: Invalid or missing API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthropicErrorResponse'
          example:
            type: error
            error:
              type: authentication_error
              message: "Invalid API key provided."
            request_id: req_abc123
    AnthropicPermissionDenied:
      description: Insufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthropicErrorResponse'
          example:
            type: error
            error:
              type: permission_error
              message: "You do not have permission to access this resource."
            request_id: req_abc123
    AnthropicNotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthropicErrorResponse'
          example:
            type: error
            error:
              type: not_found_error
              message: "The model 'claude-999' does not exist."
            request_id: req_abc123
    AnthropicRateLimit:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthropicErrorResponse'
          example:
            type: error
            error:
              type: rate_limit_error
              message: "Rate limit exceeded. Please retry after 30 seconds."
            request_id: req_abc123
      headers:
        Retry-After:
          schema:
            type: integer
    AnthropicOverloaded:
      description: Server overloaded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthropicErrorResponse'
      headers:
        Retry-After:
          schema:
            type: integer
            description: Seconds to wait before retrying.
          example:
            type: error
            error:
              type: overloaded_error
              message: "服务器暂时过载，请稍后重试。"
            request_id: req_abc123
    AnthropicNotImplemented:
      description: Endpoint is defined by the design contract but is not implemented.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthropicErrorResponse'
          example:
            type: error
            error:
              type: api_error
              message: "This endpoint is not implemented."
            request_id: req_abc123
    AnthropicServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnthropicErrorResponse'
          example:
            type: error
            error:
              type: api_error
              message: "An internal error occurred."
            request_id: req_abc123

  # ─── Error Schemas ──────────────────────────────────────────────────
  schemas:
    OpenAIErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type]
          properties:
            message:
              type: string
              description: Human-readable error message.
            type:
              type: string
              enum:
                - invalid_request_error
                - authentication_error
                - permission_error
                - rate_limit_error
                - api_error
              description: Error type category.
            code:
              type: string
              nullable: true
              description: Stable error code for programmatic handling.
            param:
              type: string
              nullable: true
              description: The parameter that caused the error.
        status:
          type: integer
          description: HTTP status code (mirrors response status).

    AnthropicErrorResponse:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          enum: [error]
          description: Always "error" for error responses.
        error:
          type: object
          required: [type, message]
          properties:
            type:
              type: string
              enum:
                - invalid_request_error
                - authentication_error
                - permission_error
                - not_found_error
                - rate_limit_error
                - timeout_error
                - overloaded_error
                - api_error
                - billing_error
              description: Error type category.
            message:
              type: string
              description: Human-readable error message.
        request_id:
          type: string
          nullable: true
          description: Unique request identifier for debugging.

    # ─── Health ───────────────────────────────────────────────────────
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok

    # ─── Models ───────────────────────────────────────────────────────
    ModelListResponse:
      type: object
      required: [object, data]
      properties:
        object:
          type: string
          enum: [list]
        data:
          type: array
          items:
            $ref: '#/components/schemas/ModelObject'

    ModelObject:
      type: object
      required: [id, object, owned_by]
      properties:
        id:
          type: string
          description: Model identifier (supports selector syntax for routing).
          example: gpt-4o
        object:
          type: string
          enum: [model]
        owned_by:
          type: string
          description: Source identifier.
          example: tokenmp
        created:
          type: integer
          format: unixtime
          description: Unix timestamp when the model was registered.
        context_window:
          type: integer
          description: Context window token count.
          example: 128000
        max_output_tokens:
          type: integer
          description: Maximum output token count.
          example: 16384
        capabilities:
          type: array
          items:
            type: string
            enum:
              - text
              - vision
              - function_calling
              - json_mode
              - thinking
              - image
              - long_context
          description: Model capability tags.
          example: [text, vision, function_calling]
        thinking:
          $ref: '#/components/schemas/ModelThinkingConfig'
          nullable: true
          description: Thinking capability configuration. Null if model does not support thinking.

    ModelThinkingConfig:
      type: object
      required: [supported, default_effort, max_effort, effort_levels]
      properties:
        supported:
          type: boolean
          description: Whether the model supports thinking/reasoning.
          example: true
        default_effort:
          type: string
          enum: [none, minimal, low, medium, high, xhigh, max]
          description: Default effort when user does not specify.
          example: medium
        max_effort:
          type: string
          enum: [none, minimal, low, medium, high, xhigh, max]
          description: Maximum effort supported by this model.
          example: max
        effort_levels:
          type: array
          items:
            type: string
            enum: [none, minimal, low, medium, high, xhigh, max]
          description: All effort levels supported by this model.
          example: [none, minimal, low, medium, high, xhigh, max]
        min_budget_tokens:
          type: integer
          description: Minimum thinking budget tokens (Anthropic-style models).
          example: 1024
        max_budget_tokens:
          type: integer
          description: Maximum thinking budget tokens (Anthropic-style models).
          example: 64000

    # ─── Chat Completions ─────────────────────────────────────────────
    CreateChatCompletionRequest:
      type: object
      required: [model, messages]
      additionalProperties: false
      properties:
        model:
          type: string
          description: |
            Model selector. Supports extended syntax:
            - `gpt-4o` — base model
            - `gpt-4o:fast` — with route group
            - `gpt-4o@openai` — with provider
            - `gpt-4o:fast@openai` — with route group and provider
            - `auto` — automatic selection
          example: gpt-4o
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatRequestMessage'
          minItems: 1
        stream:
          type: boolean
          default: false
          description: Whether to stream the response as SSE.
        temperature:
          type: number
          minimum: 0
          maximum: 2
          description: Sampling temperature.
        top_p:
          type: number
          minimum: 0
          maximum: 1
          description: Nucleus sampling probability.
        max_tokens:
          type: integer
          minimum: 1
          description: Maximum output tokens (does not include reasoning tokens).
        max_completion_tokens:
          type: integer
          minimum: 1
          description: Maximum total output tokens including reasoning tokens.
        reasoning_effort:
          type: string
          enum: [none, minimal, low, medium, high, xhigh, max]
          description: |
            Thinking/reasoning depth. Only effective for models with `thinking` capability.
            Maps to upstream-native parameters automatically.
        stop:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: Stop sequences.
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ChatTool'
          description: Function calling tools.
        tool_choice:
          oneOf:
            - type: string
              enum: [none, auto, required]
            - $ref: '#/components/schemas/ChatToolChoice'
          description: Tool selection strategy.
        response_format:
          type: object
          additionalProperties: false
          properties:
            type:
              type: string
              enum: [text, json_object, json_schema]
          description: Output format constraint.
        user:
          type: string
          description: End-user identifier for abuse monitoring.

    # Request-side chat message. This is the closed (additionalProperties:false)
    # twin of ChatMessage: finite request fields are fixed, while the
    # response-side ChatMessage below stays extensible for provider extensions.
    ChatRequestMessage:
      type: object
      required: [role, content]
      additionalProperties: false
      description: |
        Request-side chat message. Finite request fields are closed
        (additionalProperties:false) so only the documented request shape is
        accepted; the response-side ChatMessage stays extensible (no
        additionalProperties:false) so provider extensions still validate.
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ChatRequestContentPart'
        name:
          type: string
          description: Optional participant name.
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ChatRequestToolCall'
          description: Tool calls made by the assistant.
        tool_call_id:
          type: string
          description: Tool call ID (for role=tool messages).
        reasoning_content:
          type: string
          nullable: true
          description: Reasoning content from thinking models (assistant messages).

    # Request-side chat content part. Closed twin of ChatContentPart: the
    # finite image_url nested object is also closed.
    ChatRequestContentPart:
      type: object
      required: [type]
      additionalProperties: false
      description: |
        Request-side chat content part. Finite request fields, including the
        image_url nested object, are closed (additionalProperties:false); the
        response-side ChatContentPart stays extensible for provider extensions.
      properties:
        type:
          type: string
          enum: [text, image_url]
        text:
          type: string
        image_url:
          type: object
          additionalProperties: false
          properties:
            url:
              type: string
              format: uri
              description: |
                Image URL. The executor accepts only bounded HTTPS URLs
                (scheme https, non-empty host, no userinfo) or bounded
                data: URLs with an image MIME type and ;base64 encoding.
                HTTP and other schemes are rejected.
            detail:
              type: string
              enum: [auto, low, high]

    # Request-side chat tool call. Closed twin of ChatToolCall: the finite
    # function nested object is also closed.
    ChatRequestToolCall:
      type: object
      required: [id, type, function]
      additionalProperties: false
      description: |
        Request-side chat tool call. Finite request fields, including the
        function nested object, are closed (additionalProperties:false); the
        response-side ChatToolCall stays extensible for provider extensions.
      properties:
        id:
          type: string
        type:
          type: string
          enum: [function]
        function:
          type: object
          required: [name, arguments]
          additionalProperties: false
          properties:
            name:
              type: string
            arguments:
              type: string

    # Response-side chat message. Intentionally left open (no
    # additionalProperties:false) so success responses carry provider
    # extensions (e.g. refusal, annotations) and still contract-validate.
    ChatMessage:
      type: object
      required: [role, content]
      description: |
        Response-side chat message used by ChatCompletionChoice.message. Left
        extensible (no additionalProperties:false) so provider extensions
        validate; request messages use the closed ChatRequestMessage twin.
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ChatContentPart'
        name:
          type: string
          description: Optional participant name.
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ChatToolCall'
          description: Tool calls made by the assistant.
        tool_call_id:
          type: string
          description: Tool call ID (for role=tool messages).
        reasoning_content:
          type: string
          nullable: true
          description: Reasoning content from thinking models (assistant messages).

    # Response-side chat content part. Left open for provider extensions.
    ChatContentPart:
      type: object
      required: [type]
      description: |
        Response-side chat content part used inside ChatMessage.content.
        Left extensible (no additionalProperties:false) so provider extensions
        validate; request content parts use the closed ChatRequestContentPart.
      properties:
        type:
          type: string
          enum: [text, image_url]
        text:
          type: string
        image_url:
          type: object
          properties:
            url:
              type: string
              format: uri
              description: |
                Image URL. The executor accepts only bounded HTTPS URLs
                (scheme https, non-empty host, no userinfo) or bounded
                data: URLs with an image MIME type and ;base64 encoding.
                HTTP and other schemes are rejected.
            detail:
              type: string
              enum: [auto, low, high]

    ChatTool:
      type: object
      required: [type, function]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          required: [name, parameters]
          additionalProperties: false
          properties:
            name:
              type: string
            description:
              type: string
            parameters:
              type: object
              description: |
                JSON Schema for function parameters. Arbitrary user-defined
                JSON Schema is accepted as-is; the field is intentionally left
                open (no additionalProperties constraint) so any valid schema
                shape passes through.
            strict:
              type: boolean

    ChatToolChoice:
      type: object
      required: [type, function]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [function]
        function:
          type: object
          required: [name]
          additionalProperties: false
          properties:
            name:
              type: string

    # Response-side chat tool call. Left open for provider extensions.
    ChatToolCall:
      type: object
      required: [id, type, function]
      description: |
        Response-side chat tool call used inside ChatMessage.tool_calls. Left
        extensible (no additionalProperties:false) so provider extensions
        validate; request tool calls use the closed ChatRequestToolCall twin.
      properties:
        id:
          type: string
        type:
          type: string
          enum: [function]
        function:
          type: object
          required: [name, arguments]
          properties:
            name:
              type: string
            arguments:
              type: string

    ChatCompletionResponse:
      type: object
      required: [id, object, model, choices]
      properties:
        id:
          type: string
          description: Completion ID.
          example: chatcmpl-abc123
        object:
          type: string
          enum: [chat.completion]
        created:
          type: integer
          format: unixtime
        model:
          type: string
          description: Model used for completion.
        choices:
          type: array
          items:
            $ref: '#/components/schemas/ChatCompletionChoice'
        usage:
          $ref: '#/components/schemas/ChatUsage'

    ChatCompletionChoice:
      type: object
      required: [index, finish_reason]
      properties:
        index:
          type: integer
        message:
          $ref: '#/components/schemas/ChatMessage'
        finish_reason:
          type: string
          enum: [stop, length, tool_calls, content_filter]
          nullable: true
        logprobs:
          type: object
          nullable: true

    ChatUsage:
      type: object
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        prompt_tokens_details:
          type: object
          properties:
            cached_tokens:
              type: integer
        completion_tokens_details:
          type: object
          properties:
            reasoning_tokens:
              type: integer
              description: Tokens used for reasoning/thinking.
            accepted_prediction_tokens:
              type: integer
            rejected_prediction_tokens:
              type: integer

    # ─── Anthropic Messages ───────────────────────────────────────────
    CreateMessageRequest:
      type: object
      required: [model, messages, max_tokens]
      additionalProperties: false
      properties:
        model:
          type: string
          description: Model selector (extended syntax supported).
          example: claude-3-opus-20240229
        messages:
          type: array
          items:
            $ref: '#/components/schemas/AnthropicMessage'
          minItems: 1
        max_tokens:
          type: integer
          minimum: 1
          description: Maximum output tokens.
        system:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/AnthropicSystemBlock'
          description: System prompt.
        thinking:
          $ref: '#/components/schemas/ThinkingConfig'
          description: Extended thinking configuration.
        stream:
          type: boolean
          default: false
        temperature:
          type: number
          minimum: 0
          maximum: 1
        top_p:
          type: number
          minimum: 0
          maximum: 1
        top_k:
          type: integer
          minimum: 1
        stop_sequences:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            $ref: '#/components/schemas/AnthropicTool'
        tool_choice:
          $ref: '#/components/schemas/AnthropicToolChoice'
        metadata:
          type: object
          additionalProperties: false
          properties:
            user_id:
              type: string

    ThinkingConfig:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [enabled, disabled]
          description: Whether thinking is enabled.
        budget_tokens:
          type: integer
          minimum: 1024
          description: |
            Thinking token budget. Required when type=enabled and must be
            >= 1024 and strictly less than max_tokens (budget_tokens <
            max_tokens). When type=disabled this field must be omitted.
            Only valid when type=enabled.
        display:
          type: string
          enum: [summarized, omitted]
          description: |
            Controls thinking content in response.
            "summarized" returns thinking text, "omitted" returns only signature.

    AnthropicSystemBlock:
      type: object
      required: [type, text]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string
        cache_control:
          type: object
          additionalProperties: false
          properties:
            type:
              type: string
              enum: [ephemeral]

    AnthropicMessage:
      type: object
      required: [role, content]
      additionalProperties: false
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/AnthropicContentBlock'

    AnthropicContentBlock:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [text, image, tool_use, tool_result, thinking]
        # Text block
        text:
          type: string
        # Image block
        source:
          type: object
          additionalProperties: false
          properties:
            type:
              type: string
              enum: [base64]
            media_type:
              type: string
              enum: [image/jpeg, image/png, image/gif, image/webp]
              description: MIME type of the base64-encoded image data.
            data:
              type: string
              description: |
                Base64-encoded (standard padded) image bytes. Must decode
                to a non-empty value within the executor's decoded byte
                bound. URL-safe alphabet and raw (unpadded) encodings are
                rejected.
        # Tool use block
        id:
          type: string
        name:
          type: string
        input:
          type: object
          description: |
            Tool input object. Arbitrary user-defined JSON is accepted as-is;
            the field is intentionally left open (no additionalProperties
            constraint) so any valid JSON object passes through.
        # Tool result block
        tool_use_id:
          type: string
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/AnthropicContentBlock'
        # Thinking block
        thinking:
          type: string
          description: Thinking/reasoning content.
        signature:
          type: string
          description: Cryptographic signature for thinking block continuity.
        # Cache control
        cache_control:
          type: object
          additionalProperties: false
          properties:
            type:
              type: string
              enum: [ephemeral]

    AnthropicTool:
      type: object
      required: [name, input_schema]
      additionalProperties: false
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object
          description: |
            JSON Schema for tool input. Arbitrary user-defined JSON Schema is
            accepted as-is; the field is intentionally left open (no
            additionalProperties constraint) so any valid schema shape passes
            through.
        cache_control:
          type: object
          additionalProperties: false
          properties:
            type:
              type: string
              enum: [ephemeral]

    AnthropicToolChoice:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [auto, any, tool]
        name:
          type: string
          description: Required when type=tool.
        disable_parallel_tool_use:
          type: boolean

    CreateMessageResponse:
      type: object
      required: [id, type, role, content, model, stop_reason, usage]
      properties:
        id:
          type: string
          example: msg_abc123
        type:
          type: string
          enum: [message]
        role:
          type: string
          enum: [assistant]
        content:
          type: array
          items:
            $ref: '#/components/schemas/AnthropicResponseContentBlock'
        model:
          type: string
        stop_reason:
          type: string
          enum: [end_turn, max_tokens, stop_sequence, tool_use]
          nullable: true
        stop_sequence:
          type: string
          nullable: true
        usage:
          $ref: '#/components/schemas/AnthropicUsage'

    AnthropicResponseContentBlock:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text, tool_use, thinking]
        # Text block
        text:
          type: string
        # Tool use block
        id:
          type: string
        name:
          type: string
        input:
          type: object
        # Thinking block
        thinking:
          type: string
        signature:
          type: string

    AnthropicUsage:
      type: object
      required: [input_tokens, output_tokens]
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cache_creation_input_tokens:
          type: integer
        cache_read_input_tokens:
          type: integer

    # ─── OpenAI Responses ─────────────────────────────────────────────
    CreateResponseRequest:
      type: object
      required: [model, input]
      additionalProperties: false
      properties:
        model:
          type: string
          description: Model selector (extended syntax supported).
          example: gpt-4o
        input:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ResponseInputItem'
          description: Input text or message array.
        stream:
          type: boolean
          default: false
        instructions:
          type: string
          description: System instructions.
        max_output_tokens:
          type: integer
          minimum: 1
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
          minimum: 0
          maximum: 1
        reasoning:
          $ref: '#/components/schemas/ResponseReasoningConfig'
          description: Reasoning configuration.
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ResponseTool'
        tool_choice:
          type: string
          enum: [none, auto, required]
        text:
          type: object
          additionalProperties: false
          properties:
            format:
              type: object
              additionalProperties: false
              properties:
                type:
                  type: string
                  enum: [text, json_object, json_schema]
                name:
                  type: string
                schema:
                  type: object
                  description: |
                    JSON Schema for structured output. Arbitrary user-defined
                    JSON Schema is accepted as-is; the field is intentionally
                    left open (no additionalProperties constraint).
        metadata:
          type: object
          additionalProperties: false
          properties:
            user_id:
              type: string

    ResponseReasoningConfig:
      type: object
      additionalProperties: false
      properties:
        effort:
          type: string
          enum: [none, minimal, low, medium, high, xhigh, max]
          description: |
            Reasoning effort level. Only effective for models with `thinking` capability.
        summary:
          type: string
          enum: [auto, detailed, none]
          description: Controls reasoning summary in response.

    ResponseInputItem:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [message]
        role:
          type: string
          enum: [user, assistant, system, developer]
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ResponseContentPart'

    ResponseContentPart:
      type: object
      required: [type]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [input_text, input_image, output_text]
        text:
          type: string
        image_url:
          type: string
          format: uri
          description: |
            Image URL. The executor accepts only bounded HTTPS URLs
            (scheme https, non-empty host, no userinfo) or bounded
            data: URLs with an image MIME type and ;base64 encoding.
            HTTP and other schemes are rejected.

    ResponseTool:
      type: object
      required: [type, name, parameters]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [function]
        name:
          type: string
        description:
          type: string
        parameters:
          type: object
          description: |
            JSON Schema for function parameters. Arbitrary user-defined JSON
            Schema is accepted as-is; the field is intentionally left open
            (no additionalProperties constraint).
        strict:
          type: boolean

    ResponseResponse:
      type: object
      required: [id, object, status, output, usage]
      properties:
        id:
          type: string
          example: resp_abc123
        object:
          type: string
          enum: [response]
        created_at:
          type: integer
          format: unixtime
        status:
          type: string
          enum: [completed, failed, incomplete, in_progress, cancelled]
        model:
          type: string
        output:
          type: array
          items:
            $ref: '#/components/schemas/ResponseOutputItem'
        usage:
          $ref: '#/components/schemas/ResponseUsage'
        error:
          type: object
          nullable: true
          properties:
            type:
              type: string
            message:
              type: string
            code:
              type: string
        incomplete_details:
          type: object
          nullable: true
          properties:
            reason:
              type: string

    ResponseOutputItem:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [message, function_call, reasoning]
        id:
          type: string
        # Message type
        role:
          type: string
          enum: [assistant]
        content:
          type: array
          items:
            $ref: '#/components/schemas/ResponseOutputContent'
        status:
          type: string
          enum: [completed, incomplete]
        # Function call type
        name:
          type: string
        call_id:
          type: string
        arguments:
          type: string
        # Reasoning type
        summary:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [summary_text]
              text:
                type: string

    ResponseOutputContent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [output_text, refusal]
        text:
          type: string
        annotations:
          type: array
          items:
            type: object

    ResponseUsage:
      type: object
      required: [input_tokens, output_tokens, total_tokens]
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        total_tokens:
          type: integer
        input_tokens_details:
          type: object
          properties:
            cached_tokens:
              type: integer
        output_tokens_details:
          type: object
          properties:
            reasoning_tokens:
              type: integer

    # ─── Images ───────────────────────────────────────────────────────
    CreateImageRequest:
      type: object
      required: [model, prompt]
      additionalProperties: false
      properties:
        model:
          type: string
          description: Image model selector.
          example: dall-e-3
        prompt:
          type: string
          description: Image description.
        n:
          type: integer
          minimum: 1
          maximum: 10
          default: 1
          description: Number of images to generate.
        size:
          type: string
          enum: [256x256, 512x512, 1024x1024, 1792x1024, 1024x1792]
          default: 1024x1024
        quality:
          type: string
          enum: [standard, hd]
          default: standard
        response_format:
          type: string
          enum: [url, b64_json]
          default: url
        style:
          type: string
          enum: [vivid, natural]
          default: vivid
        user:
          type: string

    CreateImageResponse:
      type: object
      required: [created, data]
      properties:
        created:
          type: integer
          format: unixtime
        data:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
              b64_json:
                type: string
              revised_prompt:
                type: string
