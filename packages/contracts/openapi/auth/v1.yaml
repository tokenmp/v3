openapi: 3.0.3
info:
  title: TokenMP v3 Auth API
  version: 0.3.0
  description: |
    TokenMP v3 Auth API contract — the single source of truth for consumers
    of the Auth Service HTTP interface. This document describes the
    implemented endpoints, request/response shapes, authentication mechanism,
    idempotency guarantees and error semantics.

    Authentication uses Ed25519 (EdDSA) JWT access tokens. Refresh tokens are
    opaque base64url strings that rotate on each use; reuse of a revoked
    refresh token revokes the entire token family.

    API key management endpoints (`/api/v1/auth/keys*`) let an authenticated
    user create, list, inspect, modify, revoke and rotate opaque API
    keys. The full key secret is returned exactly once on create/rotate; only
    a one-way hash of the key is persisted.

    **Rate limiting is NOT implemented.** Consumers and operators must not
    assume the service is rate-limited. Rate limiting must be provided by a
    future gateway or shared policy before production deployment.

    This document is the complete and authoritative HTTP contract for
    consumers. No service implementation context is required to discover
    or interpret the API.
servers:
  - url: http://127.0.0.1:8080
    description: Local development
paths:
  /healthz:
    get:
      summary: Liveness probe
      description: Reports whether the process and HTTP server are alive. Does not depend on external resources.
      operationId: getHealthz
      responses:
        '200':
          description: Service is alive.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '405':
          description: Method not allowed.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
    head:
      summary: Liveness probe (HEAD)
      description: |
        Same status and headers as GET /healthz but with an empty body, per
        HTTP semantics for HEAD. Used by lightweight probes that only need
        the status code.
      operationId: headHealthz
      responses:
        '200':
          description: Service is alive. No body is returned for HEAD.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
        '405':
          description: Method not allowed.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
  /readyz:
    get:
      summary: Readiness probe
      description: |
        Reports whether the service is ready to serve traffic, including a
        connectivity check to its backing store. A failure returns 503 and
        never leaks the underlying error message.
      operationId: getReadyz
      responses:
        '200':
          description: Service is ready.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is not ready. The body intentionally omits the underlying cause.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '405':
          description: Method not allowed.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
    head:
      summary: Readiness probe (HEAD)
      description: |
        Same status and headers as GET /readyz but with an empty body, per
        HTTP semantics for HEAD. Returns 200 when ready and 503 when not
        ready; the 503 response carries no body and never leaks the
        underlying cause.
      operationId: headReadyz
      responses:
        '200':
          description: Service is ready. No body is returned for HEAD.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
        '503':
          description: Service is not ready. No body is returned for HEAD.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
        '405':
          description: Method not allowed.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
  /api/v1/auth/register:
    post:
      summary: Register a new user
      description: |
        Creates a new user with a normalized email. Does NOT auto-login: no
        session or access token is issued. On duplicate email returns 409
        `email_taken`. The response shape is the public user view (no
        password or internal metadata).
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '400':
          description: Invalid email or password does not meet the policy.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/login:
    post:
      summary: Log in
      description: |
        Authenticates by email + password and returns a new access token and
        refresh token. On any failure (unknown user, wrong password, disabled
        account) the same 401 `invalid_credentials` is returned. Tokens are
        returned in the JSON body (not cookies); browser clients must store
        them securely.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Tokens issued.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Invalid request body.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid email or password, or account disabled.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/refresh:
    post:
      summary: Rotate a refresh token
      description: |
        Rotates a refresh token: if valid, a new token pair is issued and the
        old token is revoked. If the presented token is already revoked, this
        is treated as reuse: all active tokens in the family are revoked
        and the response is the same 401 shape as an invalid refresh token so
        reuse is not signalled to an attacker.
        Expired refresh tokens and disabled accounts also return 401.
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New tokens issued.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Refresh token is invalid, expired, or reused.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/logout:
    post:
      summary: Log out (revoke a single refresh token)
      description: |
        Revokes the single session identified by the refresh token. Idempotent:
        an invalid, malformed, absent or already-revoked token also returns 204
        so the endpoint cannot be used to probe whether a token exists. A
        missing or malformed request body is not an error; the body is optional
        and any decode failure is treated the same as an empty/invalid token.
      operationId: logout
      requestBody:
        required: false
        description: |
          Optional. When present, must be a JSON object with a `refresh_token`
          field. Malformed, absent, or invalid token bodies are all treated
          idempotently as 204 and are never used to probe token existence.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: Logout completed (or was already a no-op).
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
  /api/v1/auth/logout-all:
    post:
      summary: Log out everywhere
      description: |
        Requires a Bearer access token. Revokes all active sessions for the
        user and invalidates all outstanding access tokens immediately.
      operationId: logoutAll
      security:
        - bearerAuth: []
      responses:
        '204':
          description: All sessions revoked; access tokens invalidated.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
        '401':
          description: Missing or invalid access token.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/me:
    get:
      summary: Current user
      description: |
        Requires a Bearer access token. Returns the public user view. A
        disabled account or an invalidated access token is rejected with 401.
      operationId: me
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The authenticated user.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicUser'
        '401':
          description: Missing, invalid, expired or revoked access token.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/password:
    put:
      summary: Change password
      description: |
        Requires a Bearer access token. Verifies the current password,
        validates the new password, updates it, and revokes all active
        sessions (including the current one). Returns 204; the caller must
        re-login.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed; all sessions revoked.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
        '400':
          description: New password does not meet the policy.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing/invalid access token or wrong current password.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/keys:
    get:
      summary: List API keys
      description: |
        Requires a Bearer access token. Returns all non-revoked API keys
        belonging to the authenticated user, newest first. Disabled keys
        remain visible for lifecycle management. Key secrets are never
        returned; only `key_prefix` and `key_suffix` are exposed for
        identification.
      operationId: authListApiKeys
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API key list.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                additionalProperties: false
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApiKey'
        '401':
          description: Missing, invalid, expired or revoked access token.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: Create an API key
      description: |
        Requires a Bearer access token. Generates a new opaque API key,
        persists only a one-way hash of the key, and returns the full secret
        exactly once in the response. The secret is never retrievable again.
      operationId: authCreateApiKey
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: API key created. The `secret` is returned only this once.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                type: object
                required: [key]
                additionalProperties: false
                properties:
                  key:
                    $ref: '#/components/schemas/ApiKeyCreated'
        '400':
          description: Invalid request body.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing, invalid, expired or revoked access token.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/keys/{keyId}:
    parameters:
      - $ref: '#/components/parameters/KeyId'
    get:
      summary: Get API key details
      description: |
        Requires a Bearer access token. Returns a single non-revoked API key
        owned by the authenticated user. The secret is never returned.
      operationId: authGetApiKey
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API key details.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                type: object
                required: [key]
                additionalProperties: false
                properties:
                  key:
                    $ref: '#/components/schemas/ApiKey'
        '401':
          description: Missing, invalid, expired or revoked access token.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: API key not found or does not belong to the user.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      summary: Modify an API key
      description: |
        Requires a Bearer access token. Modifies the `name` and/or `status`
        of a non-revoked API key owned by the authenticated user. The secret
        is never returned.
      operationId: authUpdateApiKey
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApiKeyRequest'
      responses:
        '200':
          description: API key modified.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                type: object
                required: [key]
                additionalProperties: false
                properties:
                  key:
                    $ref: '#/components/schemas/ApiKey'
        '400':
          description: Invalid request body.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing, invalid, expired or revoked access token.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: API key not found or does not belong to the user.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: Revoke an API key
      description: |
        Requires a Bearer access token. Revokes a non-revoked API key
        owned by the authenticated user by setting its status to `disabled`.
        Idempotent: revoking an already-disabled key still returns 204. A
        revoked key is treated as not found (404).
      operationId: authDeleteApiKey
      security:
        - bearerAuth: []
      responses:
        '204':
          description: API key revoked (or was already disabled.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
        '401':
          description: Missing, invalid, expired or revoked access token.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: API key not found or does not belong to the user.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/auth/keys/{keyId}/rotate:
    parameters:
      - $ref: '#/components/parameters/KeyId'
    post:
      summary: Rotate an API key
      description: |
        Requires a Bearer access token. Generates a new secret for an
        existing non-revoked API key owned by the authenticated user,
        replaces the persisted hash, and re-activates the key (status becomes
        `active`). Metadata (name, expiration) is preserved. The new secret
        is returned exactly once.
      operationId: authRotateApiKey
      security:
        - bearerAuth: []
      responses:
        '200':
          description: API key rotated. The new `secret` is returned only this once.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                type: object
                required: [key]
                additionalProperties: false
                properties:
                  key:
                    $ref: '#/components/schemas/ApiKeyCreated'
        '401':
          description: Missing, invalid, expired or revoked access token.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: API key not found or does not belong to the user.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error.
          headers:
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Content-Type:
              $ref: '#/components/headers/ContentTypeJSON'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Ed25519 (EdDSA) access token in the Authorization header as
        `Bearer <token>`. Consumers need only the public key to verify.
  parameters:
    KeyId:
      name: keyId
      in: path
      required: true
      description: UUID of the API key.
      schema:
        type: string
        format: uuid
  headers:
    CacheControlNoStore:
      description: Responses are never cached by intermediaries.
      schema:
        type: string
        enum: ['no-store']
        example: no-store
    ContentTypeJSON:
      description: JSON responses are UTF-8 encoded.
      schema:
        type: string
        enum: ['application/json; charset=utf-8']
        example: application/json; charset=utf-8
  schemas:
    HealthResponse:
      type: object
      required: [status, service, timestamp]
      properties:
        status:
          type: string
          enum: [ok, unready]
          description: Liveness or readiness outcome.
        service:
          type: string
          enum: [auth]
          description: Emitting service identifier.
        timestamp:
          type: string
          format: date-time
          description: RFC 3339 UTC timestamp of the response.
    PublicUser:
      type: object
      required: [id, email, role, status, created_at]
      description: |
        Public user view. Never includes password or internal metadata.
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, disabled]
        created_at:
          type: string
          format: date-time
    RegisterRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          description: Normalized to lowercase and trimmed before processing.
        password:
          type: string
          format: password
          minLength: 12
          maxLength: 128
          description: |
            Raw UTF-8; not trimmed and not NFKC-normalized. 12..128 Unicode
            code points; no NUL or control characters.
    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    RefreshRequest:
      type: object
      required: [refresh_token]
      additionalProperties: false
      properties:
        refresh_token:
          type: string
          description: Opaque base64url refresh token.
    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: Opaque base64url refresh token.
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      additionalProperties: false
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 12
          maxLength: 128
    TokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: Ed25519 (EdDSA) JWT access token.
        refresh_token:
          type: string
          description: Opaque base64url refresh token.
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Access token lifetime in seconds.
    Error:
      type: object
      required: [error]
      description: |
        Uniform error body. `code` is a stable machine-readable identifier;
        `message` is a human-readable string that never leaks internal
        implementation details, credentials or token material.
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - invalid_credentials
                - email_taken
                - invalid_token
                - invalid_refresh_token
                - password_too_weak
                - invalid_email
                - bad_request
                - unauthorized
                - not_found
                - internal_error
            message:
              type: string
    ApiKey:
      type: object
      required: [id, name, key_prefix, key_suffix, status, created_at]
      additionalProperties: false
      description: |
        Public API key view. The full secret is never returned; only
        `key_prefix` and `key_suffix` are exposed for identification.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
          description: Human-readable key name.
        key_prefix:
          type: string
          description: First characters of the key for display.
        key_suffix:
          type: string
          description: Last characters of the key for display.
        status:
          type: string
          enum: [active, disabled]
          description: Lifecycle status. `revoked` is never exposed to owners.
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Last successful verification, or null if never used.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration time, or null if the key never expires.
        created_at:
          type: string
          format: date-time
    ApiKeyCreated:
      type: object
      required: [id, name, key_prefix, key_suffix, secret, status, created_at]
      additionalProperties: false
      description: |
        API key with its full secret. Returned only on create and rotate;
        the secret is never retrievable again.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 128
        key_prefix:
          type: string
        key_suffix:
          type: string
        secret:
          type: string
          description: Full API key secret — only returned on create/rotate.
        status:
          type: string
          enum: [active]
        created_at:
          type: string
          format: date-time
    CreateApiKeyRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 128
          description: Optional human-readable key name.
        expires_at:
          type: string
          format: date-time
          description: Optional expiration time.
    UpdateApiKeyRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 128
          description: New human-readable key name.
        status:
          type: string
          enum: [active, disabled]
          description: New lifecycle status.
