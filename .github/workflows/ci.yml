name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      # pnpm/action-setup must run before actions/setup-node so the cache
      # input can resolve the pnpm version. Node 26.4.0 does not ship
      # Corepack, so the pinned pnpm 11.15.0 is installed by this action
      # directly from package.json's packageManager field.
      - name: Setup pnpm
        # pnpm/action-setup v4.4.0
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        with:
          version: 11.15.0

      - name: Setup Node.js
        # actions/setup-node v5
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 26.4.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      # Download the open-source Gitleaks CLI at a fixed version directly on
      # the runner. The gitleaks-action wrapper is intentionally NOT used:
      # for organization repositories it may require a GITLEAKS_LICENSE
      # secret, which would break this baseline's no-extra-secret commitment.
      # No repository secret and no GITHUB_TOKEN is referenced, so fork pull
      # requests are scanned without any extra secret.
      - name: Install and verify Gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          set -euo pipefail
          tmpdir="${RUNNER_TEMP:?}/gitleaks"
          mkdir -p "$tmpdir"
          cd "$tmpdir"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          checksum_file="gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --retry 3 --retry-delay 5 \
            --output "$checksum_file" "${base}/${checksum_file}"
          curl --fail --location --retry 3 --retry-delay 5 \
            --output "$tarball" "${base}/${tarball}"
          # Verify the tarball against the official checksums file. Only the
          # linux_x64 entry is present locally; --ignore-missing skips the rest.
          sha256sum -c --ignore-missing "$checksum_file"
          tar -xzf "$tarball" -C "$tmpdir"
          chmod +x "$tmpdir/gitleaks"
          echo "$tmpdir" >> "$GITHUB_PATH"

      - name: Gitleaks scan
        run: gitleaks git --redact --verbose --exit-code 1 .

  go-auth:
    name: go auth / format / vet / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        # Pinned to Postgres 17 alpine per ADR 0004.
        image: postgres:17-alpine
        env:
          POSTGRES_USER: tokenmp
          POSTGRES_PASSWORD: tokenmp
          POSTGRES_DB: tokenmp_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tokenmp -d tokenmp_auth"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      AUTH_DATABASE_URL: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_auth?sslmode=disable
      CONFIG_DATABASE_URL: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_config?sslmode=disable
      CONFIG_REPO_TEST_DSN: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_config?sslmode=disable
      LOGGING_DATABASE_URL: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_logging?sslmode=disable
      LOGGING_REPO_TEST_DSN: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_logging?sslmode=disable
      BILLING_DATABASE_URL: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_billing?sslmode=disable
      BILLING_REPO_TEST_DSN: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_billing?sslmode=disable
    steps:
      - name: Checkout
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup Go
        # actions/setup-go v6
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: "1.26.5"
          cache-dependency-path: |
            services/auth/go.sum
            services/executor/go.sum
            services/config/go.sum
            services/logging/go.sum
            services/billing/go.sum

      - name: Generated code freshness check (Auth)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          bash packages/contracts/go/check-generated.sh

      # Minimal Executor generated freshness step. Reuses this go-auth job's
      # Go 1.26.5 toolchain; no separate Executor CI job, runtime, build, or
      # test is added. The script byte-compares committed Executor generated
      # models/server against a temp regeneration.
      - name: Generated code freshness check (Executor)
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          bash packages/contracts/go/check-generated-executor.sh

      # Executor has no database dependency. Test the generated transport and
      # its contract handler in this existing Go job without registering its
      # business routes in the runtime server.
      - name: go test -race (Executor generated transport)
        working-directory: services/executor
        run: go test -race ./internal/server/... ./internal/transport/executorv1api/... ./internal/contract/executorv1/...

      # Keep the pure compiler/snapshot/routing/pipeline/adapter SDK/config
      # source/credential-env/identity-env/quarantine-bridge boundary race-checked
      # in this existing job, plus the runtime composition root, the now
      # composition-aware config/app packages, and the cmd/executor process
      # tests. It has no database or live-provider access; SDK HTTP tests use
      # only local TLS httptest servers, and the process/composition tests use
      # temp empty configs and non-secret test API keys (no map JSON or
      # credential environment value is committed to CI).
      # ./internal/configsource/... covers the strict secret-free file loader and
      # initial generation=1 bootstrap; ./internal/credentialenv/... covers the
      # secret-free vault-ref map, per-attempt lookup/rotation, and
      # compiled-snapshot validation; ./internal/identityenv/... covers the
      # non-secret identity map and per-request API-key rotation.
      # ./internal/quarantinebridge/... is listed explicitly because it is a
      # separate package from ./internal/routing/...; the routing race pattern
      # does not automatically test it, so it must be added to the package list
      # to be covered. The transport-neutral nonstream boundary, facade, auth
      # context, request-id, transport-neutral stream boundary/facade, and Phase 8
      # streaming packages are likewise independent and explicitly race-tested. `./internal/execution/...` includes the Phase
      # 8.2 internal StreamDriver (AttemptSession/registry/payload adapter/Bridge,
      # retry/quota/log/result/cleanup); `./internal/sdk/...` covers OpenAI legacy Images (now
      # registered for completion-only non-stream execution) and Anthropic adapter packages.
      # `./internal/imagecontract/...` is an independent SDK/transport shared validator package,
      # so it is explicitly race-tested. Fuzz remains local-only. ./internal/composition/... wires the runtime
      # composition root (store, config source, credential/identity resolvers,
      # in-memory runtime/quarantine/quota/log, SDK registry, completion Runner + StreamDriver, non-stream + stream facades,
      # generated hybrid plain/strict handler, AuthMiddleware+CaptureRawBody) and rejects
      # unsupported enabled routes; ./internal/config/... now requires
      # EXECUTOR_CONFIG_FILE/EXECUTOR_CREDENTIAL_REF_MAP_JSON/
      # EXECUTOR_IDENTITY_MAP_JSON with redacted errors; ./internal/app/...
      # takes an injected handler (fail-closed on nil); ./cmd/executor/...
      # runs the real binary against a temp empty config and asserts health,
      # 401 on anonymous /v1, JSON 404 before SSE commit for authenticated stream requests
      # with a missing model, and fail-before-listen on invalid composition/config.
      - name: go test -race (Executor compiler/snapshot/routing/pipeline/adapter SDK/config source/credential env/identity env/quarantine bridge/stream driver/response contract/composition/config/app/process)
        working-directory: services/executor
        run: go test -race -count=1 ./internal/adapter/... ./internal/snapshot/... ./internal/routing/... ./internal/execution/... ./internal/requestlog/... ./internal/quota/... ./internal/sdk/... ./internal/configsource/... ./internal/configreload/... ./internal/credentialenv/... ./internal/identityenv/... ./internal/jwtverifier/... ./internal/quarantinebridge/... ./internal/imagecontract/... ./internal/nonstream/... ./internal/nonstreamfacade/... ./internal/authcontext/... ./internal/requestid/... ./internal/stream/... ./internal/streamfacade/... ./internal/streaming/... ./internal/responsecontract/... ./internal/metrics/... ./internal/composition/... ./internal/config/... ./internal/app/... ./cmd/executor/...

      - name: Install golang-migrate CLI
        env:
          MIGRATE_VERSION: "4.18.3"
        run: |
          set -euo pipefail
          tmpdir="${RUNNER_TEMP:?}/migrate"
          mkdir -p "$tmpdir"
          # Verify the requested version resolves in the module graph before
          # trusting it. `go list -m -versions` exits non-zero if absent.
          go list -m -versions github.com/golang-migrate/migrate/v4@v${MIGRATE_VERSION} >/dev/null
          # The default migrate build only ships the `stub` database driver.
          # Build with the `postgres` tag so the CLI can talk to PostgreSQL.
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v${MIGRATE_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gofmt
        working-directory: services/auth
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        working-directory: services/auth
        run: go vet ./... && go vet -tags=integration ./...

      - name: go test -race (unit)
        working-directory: services/auth
        run: go test -race ./...

      - name: go build
        working-directory: services/auth
        run: |
          go build ./...
          go build -o /tmp/auth-bin ./cmd/auth
          go build -o /tmp/healthcheck-bin ./cmd/healthcheck

      # Build the auth Docker image on the GitHub Runner to validate the
      # Dockerfile end-to-end as part of CI. Build only: the image is not
      # run, not pushed, not published to any registry, and not tagged into
      # a long-lived cache. This step requires no local Docker on developer
      # machines — the Ubuntu runner provides Docker out of the box.
      - name: docker build (build only, no run/push)
        run: docker build -f services/auth/Dockerfile -t tokenmp-v3-auth:${{ github.sha }} .

      # Build the executor Docker image on the GitHub Runner to validate the
      # Dockerfile end-to-end as part of CI. Build only: the image is not
      # run, not pushed, not published to any registry, and not tagged into
      # a long-lived cache. This step requires no local Docker on developer
      # machines — the Ubuntu runner provides Docker out of the box.
      - name: docker build executor (build only, no run/push)
        run: docker build -f services/executor/Dockerfile -t tokenmp-v3-executor:${{ github.sha }} .

      # ------------------------------------------------------------------
      # Config service (skeleton): gofmt / vet / build / unit test / migration
      # cycle / repository integration test. Reuses this job's Postgres 17
      # service via a separate tokenmp_config database created below.
      # ------------------------------------------------------------------
      - name: Create tokenmp_config database
        env:
          PGPASSWORD: tokenmp
        run: |
          psql -h localhost -U tokenmp -d postgres -c "CREATE DATABASE tokenmp_config;" || true

      - name: gofmt (config)
        working-directory: services/config
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet (config)
        working-directory: services/config
        run: go vet ./...

      - name: go build (config)
        working-directory: services/config
        run: |
          go build ./...
          go build -o /tmp/config-bin ./cmd/config

      - name: go test -race (config unit)
        working-directory: services/config
        run: go test -race ./internal/config/... ./internal/database/... ./internal/server/...

      - name: Config migration cycle (up/down/up)
        working-directory: services/config
        run: |
          set -euo pipefail
          migrate -path migrations -database "$CONFIG_DATABASE_URL" up
          migrate -path migrations -database "$CONFIG_DATABASE_URL" down -all
          migrate -path migrations -database "$CONFIG_DATABASE_URL" up

      - name: go test -race (config repository integration)
        working-directory: services/config
        env:
          CONFIG_REPO_TEST_DSN: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_config?sslmode=disable
        run: go test -race ./internal/repository/...

      # ------------------------------------------------------------------
      # Logging service (skeleton): gofmt / vet / build / unit test / migration
      # cycle / repository integration test. Reuses this job's Postgres 17
      # service via a separate tokenmp_logging database created below.
      # ------------------------------------------------------------------
      - name: Create tokenmp_logging database
        env:
          PGPASSWORD: tokenmp
        run: |
          psql -h localhost -U tokenmp -d postgres -c "CREATE DATABASE tokenmp_logging;" || true

      - name: gofmt (logging)
        working-directory: services/logging
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet (logging)
        working-directory: services/logging
        run: go vet ./...

      - name: go build (logging)
        working-directory: services/logging
        run: |
          go build ./...
          go build -o /tmp/logging-bin ./cmd/logging

      - name: go test -race (logging unit)
        working-directory: services/logging
        run: go test -race ./internal/config/... ./internal/database/... ./internal/server/...

      - name: Logging migration cycle (up/down/up)
        working-directory: services/logging
        run: |
          set -euo pipefail
          migrate -path migrations -database "$LOGGING_DATABASE_URL" up
          migrate -path migrations -database "$LOGGING_DATABASE_URL" down -all
          migrate -path migrations -database "$LOGGING_DATABASE_URL" up

      - name: go test -race (logging repository integration)
        working-directory: services/logging
        env:
          LOGGING_REPO_TEST_DSN: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_logging?sslmode=disable
        run: go test -race ./internal/repository/...

      # ------------------------------------------------------------------
      # Billing service (skeleton): gofmt / vet / build / unit test / migration
      # cycle / repository integration test. Reuses this job's Postgres 17
      # service via a separate tokenmp_billing database created below.
      # ------------------------------------------------------------------
      - name: Create tokenmp_billing database
        env:
          PGPASSWORD: tokenmp
        run: |
          psql -h localhost -U tokenmp -d postgres -c "CREATE DATABASE tokenmp_billing;" || true

      - name: gofmt (billing)
        working-directory: services/billing
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet (billing)
        working-directory: services/billing
        run: go vet ./...

      - name: go build (billing)
        working-directory: services/billing
        run: |
          go build ./...
          go build -o /tmp/billing-bin ./cmd/billing

      - name: go test -race (billing unit)
        working-directory: services/billing
        run: go test -race ./internal/config/... ./internal/database/... ./internal/server/...

      - name: Billing migration cycle (up/down/up)
        working-directory: services/billing
        run: |
          set -euo pipefail
          migrate -path migrations -database "$BILLING_DATABASE_URL" up
          migrate -path migrations -database "$BILLING_DATABASE_URL" down -all
          migrate -path migrations -database "$BILLING_DATABASE_URL" up

      - name: go test -race (billing repository integration)
        working-directory: services/billing
        env:
          BILLING_REPO_TEST_DSN: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_billing?sslmode=disable
        run: go test -race ./internal/repository/...

      - name: Migration cycle (up/down/up)
        working-directory: services/auth
        run: |
          set -euo pipefail
          migrate -path migrations -database "$AUTH_DATABASE_URL" up
          migrate -path migrations -database "$AUTH_DATABASE_URL" down -all
          migrate -path migrations -database "$AUTH_DATABASE_URL" up

      - name: go test -race (auth repository integration)
        working-directory: services/auth
        env:
          AUTH_REPOSITORY_TEST_DSN: postgres://tokenmp:tokenmp@localhost:5432/tokenmp_auth?sslmode=disable
        run: go test -race ./internal/repository/...

      - name: Integration tests
        working-directory: services/auth
        run: go test -tags=integration -race ./test/integration/...
